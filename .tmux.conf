# Load the Tmux Plugin Manager (TPM), which installs and manages tmux plugins
set -g @plugin 'tmux-plugins/tpm'

# Load sensible default tmux settings (clipboard behavior, key timing, etc.)
set -g @plugin 'tmux-plugins/tmux-sensible'

# Load the Dracula theme for tmux status bar styling
set -g @plugin 'dracula/tmux'

# Add support for copying/yanking tmux text into the system clipboard
set -g @plugin 'tmux-plugins/tmux-yank'

# Add easier pane navigation and pane resizing keybindings
set -g @plugin 'tmux-plugins/tmux-pain-control'

# Enable Dracula status bar modules for CPU, GPU, and RAM usage
set -g @dracula-plugins "cpu-usage gpu-usage ram-usage"

# Set pane resize step size to 2 cells when using resize commands
set-option -g @pane_resize "2"

# Enable mouse support (pane switching, resizing, scrolling, selecting)
set -g mouse on

# Use Vim-style keybindings in copy mode (hjkl, / search, etc.)
set-window-option -g mode-keys vi

# Move current window left in the window list, then stay focused on it
bind Left swap-window -t -1 \; select-window -t -1

# Move current window right in the window list, then stay focused on it
bind Right swap-window -t +1 \; select-window -t +1

# Automatically renumber windows after one is closed
set -g renumber-windows on

# Initialize the Tmux Plugin Manager (must remain at the bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
