#set -g default-command "reattach-to-user-namespace -l /bin/zsh"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @dracula-plugins "cpu-usage ram-usage battery network-ping"

set-option -g @pane_resize "2"

set -g mouse on
set -g @dracula-show-left-icon session
set-window-option -g mode-keys vi
set -g renumber-windows on

# Clipboard: emit OSC 52 so selections reach the LOCAL terminal's clipboard
# (chopper is headless — no X clipboard — so this is how copy gets off the box).
# If a drag still doesn't copy, hold Shift to bypass tmux mouse mode entirely.
set -g set-clipboard on
# Tell tmux the outer terminal (xterm-256color over mosh/ssh) supports the OSC 52
# clipboard feature — without this, tmux won't emit OSC 52 over mosh and copy silently
# does nothing. This is the piece that makes copy work across mosh + tmux.
#set -as terminal-features ',xterm*:clipboard'

# Session persistence (resurrect = save/restore, continuum = automate it).
# @continuum-restore 'on' restores the last saved env when the tmux SERVER starts,
# i.e. on your first attach after a reboot (no boot/linger setup needed).
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'        # auto-save every 15 min ('0' to disable)
set -g @resurrect-capture-pane-contents 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
